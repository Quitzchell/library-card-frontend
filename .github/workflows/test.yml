# CI test workflow (Vitest) used by the private repo, mirrored here to
# demonstrate the CI setup. It is intentionally INACTIVE in this public
# portfolio mirror: there is no `pull_request` trigger and the job is guarded
# with `if: ${{ false }}`, so it never runs.
name: Test

on:
  workflow_dispatch:

jobs:
  test:
    # Disabled in the public mirror — never executes.
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test