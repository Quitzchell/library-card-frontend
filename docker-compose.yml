services:
  frontend:
    build:
      context: .
      dockerfile: dev.dockerfile
    container_name: library-card-frontend
    volumes:
      - .:/var/www/html
      - /var/www/html/.next
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    stdin_open: true
    tty: true
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
